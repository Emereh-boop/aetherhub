<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherHub - Integration Inquiries</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#020617', card: '#0f172a', accent: '#6366f1', neon: '#10b981' } } } } }
    </script>
</head>
<body class="bg-brand-dark text-slate-200 font-sans min-h-screen flex flex-col justify-between">

    <!-- PROMPT DOCUMENTATION FOR Contact
    Prompt: "Using the master layout design context, construct contact.html. Incorporate a technical consultation form layout with precise focus states for string parameters and request types."
    -->

    <!-- STICKY HEADER -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-brand-dark/80 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2"><a href="index.html" class="text-brand-neon font-mono font-black text-xl">ÆTHER.HUB</a></div>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-medium text-slate-400">
                <a href="index.html" class="hover:text-slate-200">Dashboard</a>
                <div class="relative group py-4">
                    <button class="hover:text-slate-200 flex items-center gap-1">Modules ▼</button>
                    <div class="absolute top-full left-0 w-48 bg-brand-card border border-slate-800 rounded-md shadow-xl z-50">
                        <a href="resources.html" class="block px-4 py-2 text-xs hover:bg-slate-800 hover:text-white">Tech Directory</a>
                        <a href="insights.html" class="block px-4 py-2 text-xs hover:bg-slate-800 hover:text-white">Insights Blog</a>
                        <a href="about.html" class="block px-4 py-2 text-xs hover:bg-slate-800 hover:text-white">Framework Specs</a>
                    </div>
                </div>
                <a href="about.html" class="hover:text-slate-200">About</a>
                <a href="contact.html" class="text-slate-200 font-bold">Contact</a>
            </nav>
            <div><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-brand-neon/10 text-brand-neon font-mono">SYS_ONLINE</span></div>
        </div>
    </header>

    <!-- FORM ENTRY WRAPPER -->
    <main class="flex-grow max-w-xl w-full mx-auto px-4 py-12 space-y-8">
        <div class="text-center">
            <h3 class="text-2xl font-bold text-white tracking-tight">Initialize System Integration</h3>
            <p class="text-xs text-slate-400 mt-2">Submit telemetry specification requests directly to the main node.</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Transmission Successful.');" class="bg-brand-card p-6 rounded-xl border border-slate-800 space-y-4 text-xs">
            <div>
                <label class="block text-slate-400 font-mono mb-2 uppercase tracking-wider">Inquiry Handle</label>
                <input type="text" placeholder="e.g. moses_sorzi" required class="w-full bg-slate-900 border border-slate-800 rounded p-3 text-slate-100 focus:outline-none focus:border-brand-neon transition-colors">
            </div>
            <div>
                <label class="block text-slate-400 font-mono mb-2 uppercase tracking-wider">Callback Node Link</label>
                <input type="email" placeholder="e.g. secure@node.com" required class="w-full bg-slate-900 border border-slate-800 rounded p-3 text-slate-100 focus:outline-none focus:border-brand-neon transition-colors">
            </div>
            <div>
                <label class="block text-slate-400 font-mono mb-2 uppercase tracking-wider">Payload System Context</label>
                <textarea rows="4" placeholder="Detail parameters..." required class="w-full bg-slate-900 border border-slate-800 rounded p-3 text-slate-100 focus:outline-none focus:border-brand-neon transition-colors"></textarea>
            </div>
            <button type="submit" class="w-full bg-brand-accent hover:bg-indigo-600 text-white font-bold py-3 rounded transition-all text-sm shadow-md">Dispatch Payload</button>
        </form>
    </main>

    <!-- STICKY FOOTER -->
    <footer class="sticky bottom-0 z-40 bg-brand-dark/95 border-t border-slate-900 py-4 backdrop-blur-sm">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between text-[11px] font-mono text-slate-500">
            <p>&copy; 2026 ÆTHER.HUB Framework System.</p>
            <div class="flex space-x-6 mt-2 sm:mt-0"><span>Node: Enugu_Primary</span><span>Vibe: Pure Code Validation</span></div>
        </div>
    </footer>

</body>
</html>
